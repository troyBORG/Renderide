# Builds the Rust workspace and the .NET generator solution on all major desktop OSes.
name: CI

"on":
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Quiet first-run telemetry/welcome banners on hosted runners.
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  rust:
    name: Rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux is the only runner where GStreamer dev packages are reliably installable
          # via the system package manager, so it's the only OS that exercises the
          # `video-textures` feature (which pulls in gstreamer-sys / glib-sys).
          # `--all-features` here also enables `tracy`, giving us lint coverage of that path.
          - os: ubuntu-latest
            clippy_features: "--all-features"
          - os: windows-latest
            clippy_features: ""
          - os: macos-latest
            clippy_features: ""

    steps:
      - uses: actions/checkout@v4

      # `materials::registry` wgpu smoke test requires an adapter when `CI` is set (GitHub sets it by default).
      # GStreamer dev packages are required only when the `video-textures` feature is enabled
      # (Linux clippy does this via `--all-features`); pkg-config resolves the headers/libs at build time.
      - name: Install Linux system dependencies (Vulkan + GStreamer)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers vulkan-tools \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Enable sccache (Windows)
        if: runner.os == 'Windows'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >>"${GITHUB_ENV}"
          echo "RUSTC_WRAPPER=sccache" >>"${GITHUB_ENV}"

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - uses: uncenter/setup-taplo@v2
        with:
          version: "0.10.0"

      - name: Check TOML formatting (taplo)
        run: taplo fmt --check --diff

      - name: Clippy
        run: cargo clippy --all-targets --locked ${{ matrix.clippy_features }} -- -W clippy::all -D warnings

      - name: Check Tracy feature
        if: runner.os != 'Linux'
        run: cargo check --locked -p renderide --features tracy

      - name: cargo build
        run: cargo build --locked -p renderide -p renderide-test -p bootstrapper

      - name: cargo test
        run: cargo test --workspace --locked

      - name: Run headless renderer suite
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            ./target/debug/renderide-test.exe check-suite
          else
            ./target/debug/renderide-test check-suite
          fi

      - name: Upload headless suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-renderer-suite-${{ matrix.os }}
          path: |
            target/renderide-test-out/**
            logs/renderer-test/**
            logs/renderer/**

      - name: Show sccache stats (Windows)
        if: always() && runner.os == 'Windows'
        shell: bash
        run: |
          if [[ -n "${SCCACHE_PATH:-}" ]]; then
            "${SCCACHE_PATH}" --show-stats
          fi

  dotnet:
    name: .NET / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"
          # Restores NuGet global-packages folder between runs (keyed on dependency manifests).
          cache: true
          cache-dependency-path: |
            generators/**/packages.lock.json

      - name: Restore
        run: dotnet restore Generators.sln --locked-mode

      # `dotnet format` can be sensitive to the runner's git line-ending behavior (e.g. Windows
      # `core.autocrlf=true`), so verify formatting only on Linux where checkouts match in-repo encoding.
      - name: Verify formatting
        if: runner.os == 'Linux'
        run: dotnet format Generators.sln --verify-no-changes --no-restore

      # `-warnaserror` promotes every compiler / analyzer warning to a build error;
      # combined with `latest-recommended` analyzers in the project files this gates
      # CI on a clean, warning-free build.
      - name: Build (warnings as errors)
        run: dotnet build generators/SharedTypeGenerator.Tests/SharedTypeGenerator.Tests.csproj --configuration Release --no-restore -warnaserror

      # Hosted runners do not have the host shared assembly: roundtrip sources are excluded at compile time (see SharedTypeGenerator.Tests.csproj).
      - name: Test
        run: dotnet test generators/SharedTypeGenerator.Tests/SharedTypeGenerator.Tests.csproj --configuration Release --no-build --no-restore
