minimum_pre_commit_version: "3.2.0"

repos:
  - repo: local
    hooks:
      - id: fmt
        name: rustfmt
        entry: cargo
        args: [fmt, --all, --, --check]
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: taplo
        name: taplo fmt
        entry: taplo
        args: [fmt, --check, --diff]
        language: system
        files: '\.toml$'
        pass_filenames: false
        stages: [pre-commit]

      - id: clippy
        name: clippy
        entry: cargo
        args: [clippy, --all-targets, --locked, --, -W, clippy::all, -D, warnings]
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: local-ci-pre-push
        name: local CI pre-push gate
        entry: scripts/ci/pre-push-check.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-push]
