[[binding]]
action = "left_thumbstick_touch"
path = "/user/hand/left/input/thumbstick/touch"
[[binding]]
action = "right_thumbstick_touch"
path = "/user/hand/right/input/thumbstick/touch"
[[binding]]
action = "left_thumbstick_click"
path = "/user/hand/left/input/thumbstick/click"
[[binding]]
action = "right_thumbstick_click"
