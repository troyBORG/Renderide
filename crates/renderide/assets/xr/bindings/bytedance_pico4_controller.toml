profile = "/interaction_profiles/bytedance/pico4_controller"
extension_gate = "bd_controller"

[[binding]]
action = "left_grip_pose"
path = "/user/hand/left/input/grip/pose"
[[binding]]
action = "right_grip_pose"
path = "/user/hand/right/input/grip/pose"
[[binding]]
action = "left_palm_ext_pose"
path = "/user/hand/left/input/palm_ext/pose"
extension_gate = "palm_pose"
[[binding]]
action = "right_palm_ext_pose"
path = "/user/hand/right/input/palm_ext/pose"
extension_gate = "palm_pose"

[[binding]]
action = "left_trigger"
path = "/user/hand/left/input/trigger/value"
[[binding]]
action = "right_trigger"
path = "/user/hand/right/input/trigger/value"
[[binding]]
action = "left_trigger_touch"
path = "/user/hand/left/input/trigger/touch"
[[binding]]
action = "right_trigger_touch"
path = "/user/hand/right/input/trigger/touch"
[[binding]]
action = "left_trigger_click"
path = "/user/hand/left/input/trigger/click"
[[binding]]
action = "right_trigger_click"
path = "/user/hand/right/input/trigger/click"

[[binding]]
action = "left_squeeze"
path = "/user/hand/left/input/squeeze/value"
[[binding]]
action = "right_squeeze"
path = "/user/hand/right/input/squeeze/value"
[[binding]]
action = "left_squeeze_click"
path = "/user/hand/left/input/squeeze/click"
[[binding]]
action = "right_squeeze_click"
path = "/user/hand/right/input/squeeze/click"

[[binding]]
