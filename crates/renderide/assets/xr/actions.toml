# Renderide OpenXR action manifest.
#
# Defines the single action set and every action submitted to OpenXR at session
# init. Per-profile binding tables live in `bindings/*.toml`; this file owns
# the action inventory shared across all profiles.
#
# Action `type` is one of: "pose", "bool", "float", "vector2f", "haptic".
# Localized names appear in runtime binding UIs (SteamVR, Monado tooling,
# minimal Meta overlay), so they must be human-readable English.

[action_set]
id = "renderide_input"
localized_name = "Renderide VR input"
priority = 0

# --- Pose actions ---

[[action]]
id = "left_grip_pose"
type = "pose"
localized_name = "Left grip pose"

[[action]]
id = "right_grip_pose"
